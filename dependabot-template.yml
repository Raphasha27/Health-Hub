# GitHub Dependabot Configuration
# Place this file in .github/dependabot.yml in your repositories.
#
# This configuration explicitly DISABLES Dependabot from
# opening PRs, ensuring it never interferes with your code
# or requires any kind of review/attention.

version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0

  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 0
